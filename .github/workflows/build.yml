name: Download, Patch, and Rebuild APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Apktool
      run: |
        sudo wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
        sudo chmod +x /usr/local/bin/apktool
        sudo wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
        sudo chmod +x /usr/local/bin/apktool.jar

    - name: Download APK
      run: |
        wget -O app.apk "https://github.com/saurav-home/Livebridge/releases/download/V1.0/LiveBridge.apk"

    - name: Decompile the APK
      run: |
        apktool d app.apk -o decompiled_app

    - name: Automatically Hex Edit libapp.so
      run: |
        python3 -c "
        import os
        
        for root, dirs, files in os.walk('decompiled_app'):
            if 'libapp.so' in files:
                file_path = os.path.join(root, 'libapp.so')
                print(f'Found and patching {file_path}...')
                
                with open(file_path, 'rb') as f:
                    data = f.read()
                
                # 1. Update Source Link (31 bytes)
                data = data.replace(b'appsfolder.github.io/livebridge', b'sauravbr.github.io/Livebridge//')
                
                # 2. Original App Link (32 bytes)
                data = data.replace(b'github.com/appsfolder/livebridge', b'sauravbr.github.io/Livebridge///')
                
                # 3. Bug Report Link to Telegram
                orig_bug_1 = b'https://github.com/Spottq/livebridge/issues'
                cust_bug_1 = b'https://t.me/Saurav124x'
                pad_1 = len(orig_bug_1) - len(cust_bug_1)
                if pad_1 > 0:
                    padded_1 = cust_bug_1 + b'?p=' + (b'-' * (pad_1 - 3))
                    data = data.replace(orig_bug_1, padded_1)
                
                orig_bug_2 = b'github.com/Spottq/livebridge/issues'
                cust_bug_2 = b't.me/Saurav124x'
                pad_2 = len(orig_bug_2) - len(cust_bug_2)
                if pad_2 > 0:
                    padded_2 = cust_bug_2 + b'?p=' + (b'-' * (pad_2 - 3))
                    data = data.replace(orig_bug_2, padded_2)
                
                with open(file_path, 'wb') as f:
                    f.write(data)
        "

    - name: Rebuild APK
      run: |
        apktool b decompiled_app -o unsigned.apk

    - name: Sign APK
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
        BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
        
        $BUILD_TOOLS_PATH/zipalign -v -p 4 unsigned.apk aligned.apk
        $BUILD_TOOLS_PATH/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --out final-debug.apk aligned.apk

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: LiveBridge-Patched-APK
        path: final-debug.apk
        
